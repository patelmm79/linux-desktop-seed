name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell-lint:
    name: Shell Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check all shell scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./.venv/*" | while read -r f; do
            bash -n "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: '.venv .git'
          severity: warning

  docker-lint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  bats-syntax:
    name: BATS Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate BATS test syntax
        run: |
          find tests/ -name "*.bats" | while read -r f; do
            bash -n "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done
