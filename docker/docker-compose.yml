version: "3.8"

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped

    # Environment variables from .env file
    env_file:
      - .env

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

    # Volume for persistent config and data
    volumes:
      - openclaw-data:/root/.openclaw
      - openclaw-logs:/var/log/openclaw

    # Network isolation - internal bridge only
    networks:
      - openclaw-internal

    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: false  # Needed for npm temp files

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes
volumes:
  openclaw-data:
    name: openclaw-data
  openclaw-logs:
    name: openclaw-logs

# Network isolation - internal bridge, no external access
networks:
  openclaw-internal:
    driver: bridge
    name: openclaw-internal
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16